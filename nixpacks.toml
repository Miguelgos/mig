[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "nss", "nspr", "atk", "cups", "libdrm", "dbus", "libxkbcommon", "at-spi2-atk", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa", "pango", "cairo", "expat", "glib"]

[phases.build]
cmds = ["npm install", "npm run db:generate", "npm run build"]

[start]
cmd = "npm run db:push && npm start"
